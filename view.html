<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>카드 할인 기록 - 기록 · 캘린더</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <h1>카드 할인 기록</h1>
  <p class="desc">누적된 기록을 필터·캘린더로 확인할 수 있습니다.</p>

  <div class="nav">
    <a href="index.html">입력</a>
    <a href="view.html" class="active">기록 · 캘린더</a>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="list">기록 목록</button>
    <button class="tab-btn" data-tab="calendar">카드 캘린더</button>
  </div>

  <!-- 기록 목록 탭 -->
  <div id="tab-list" class="tab-panel">
    <div class="filters">
      <div>
        <label>날짜</label>
        <select id="filter-date"><option value="">전체</option></select>
      </div>
      <div>
        <label>쇼핑몰</label>
        <select id="filter-site">
          <option value="">전체</option>
          <option>CJ온스타일</option>
          <option>Hmall</option>
          <option>롯데홈쇼핑</option>
          <option>GSSHOP</option>
          <option>기타</option>
        </select>
      </div>
      <div class="grow"></div>
      <div style="min-width:auto;">
        <button class="util-btn" id="btn-export">내보내기(JSON)</button>
      </div>
      <div style="min-width:auto;">
        <button class="util-btn" id="btn-import">가져오기</button>
        <input type="file" id="import-file" accept="application/json" style="display:none">
      </div>
    </div>
    <div id="list-wrap"></div>
  </div>

  <!-- 캘린더 탭 -->
  <div id="tab-calendar" class="tab-panel" style="display:none">
    <div class="filters">
      <div>
        <label>쇼핑몰</label>
        <select id="cal-site">
          <option>CJ온스타일</option>
          <option>Hmall</option>
          <option>롯데홈쇼핑</option>
          <option>GSSHOP</option>
          <option>기타</option>
        </select>
      </div>
      <div>
        <label>월</label>
        <input type="month" id="cal-month">
      </div>
    </div>
    <div id="cal-summary"></div>
    <div id="cal-wrap"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="storage.js"></script>
<script>
document.getElementById('cal-month').value = todayStr().slice(0,7);

let entries = [];

// 탭 전환
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).style.display = 'block';
    if(btn.dataset.tab === 'calendar') renderCalendar();
  });
});

// 필터
document.getElementById('filter-date').addEventListener('change', renderList);
document.getElementById('filter-site').addEventListener('change', renderList);

// 정렬 상태 (컬럼 헤더 클릭)
let sortField = 'date';
let sortDir = 'desc';
document.getElementById('cal-site').addEventListener('change', renderCalendar);
document.getElementById('cal-month').addEventListener('change', renderCalendar);

// 내보내기/가져오기
document.getElementById('btn-export').addEventListener('click', async () => {
  const json = await store.exportJson();
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'card-discount-' + todayStr() + '.json';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('btn-import').addEventListener('click', () => {
  document.getElementById('import-file').click();
});
document.getElementById('import-file').addEventListener('change', (ev) => {
  const file = ev.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    try{
      await store.importJson(e.target.result);
      await refreshAll();
      showToast('가져오기 완료');
    }catch(err){
      console.error(err);
      showToast('가져오기 실패: ' + (err.message || '형식 오류'));
    }
  };
  reader.readAsText(file);
  ev.target.value = '';
});

async function refreshAll(){
  document.getElementById('list-wrap').innerHTML = '<div class="empty">불러오는 중...</div>';
  entries = await store.load();
  renderFilterOptions();
  renderList();
  renderCalendar();
}

function renderFilterOptions(){
  const sel = document.getElementById('filter-date');
  const cur = sel.value;
  const dates = [...new Set(entries.map(e => e.date))].sort().reverse();
  let html = '<option value="">전체</option>';
  dates.forEach(d => { html += '<option value="' + d + '">' + d + '</option>'; });
  sel.innerHTML = html;
  sel.value = dates.includes(cur) ? cur : '';
}

function renderList(){
  const fDate = document.getElementById('filter-date').value;
  const fSite = document.getElementById('filter-site').value;
  let rows = entries.filter(e => (!fDate || e.date === fDate) && (!fSite || e.site === fSite));

  const cardOrder = ['신한','국민','삼성','롯데','현대','비씨','농협','하나','우리'];
  const rateOrder = ['5%','7%','8%','10%'];
  const kindOrder = ['전사','상품별'];
  const payOrder = ['카카오페이','토스페이','결합없음'];
  const idx = (arr, v) => { const i = arr.indexOf(v); return i === -1 ? 999 : i; };

  const cmp = (a, b) => {
    switch(sortField){
      case 'date': return a.date.localeCompare(b.date);
      case 'site': return a.site.localeCompare(b.site, 'ko');
      case 'kind': return idx(kindOrder, a.kind) - idx(kindOrder, b.kind);
      case 'pay': return idx(payOrder, a.pay) - idx(payOrder, b.pay);
      case 'card': return idx(cardOrder, a.card) - idx(cardOrder, b.card);
      case 'rate': return idx(rateOrder, a.rate) - idx(rateOrder, b.rate);
      case 'limit': return (parseFloat(a.limit)||0) - (parseFloat(b.limit)||0);
      default: return 0;
    }
  };
  rows.sort((a,b) => {
    let r = cmp(a,b);
    if(sortDir === 'desc') r = -r;
    // 2차 정렬: 최신 날짜
    if(r === 0 && sortField !== 'date') r = b.date.localeCompare(a.date);
    return r;
  });

  const wrap = document.getElementById('list-wrap');
  if(rows.length === 0){
    wrap.innerHTML = '<div class="empty">조건에 맞는 기록이 없습니다.</div>';
    return;
  }

  const arrow = f => sortField === f ? (sortDir === 'asc' ? ' ▲' : ' ▼') : '';
  const th = (label, field) => '<th class="sortable' + (sortField === field ? ' active' : '') + '" data-sort="' + field + '">' + label + '<span class="sort-arrow">' + arrow(field) + '</span></th>';

  let html = '<table><thead><tr>';
  html += th('날짜', 'date');
  html += th('쇼핑몰', 'site');
  html += th('행사 구분', 'kind');
  html += th('간편결제 결합여부', 'pay');
  html += th('카드', 'card');
  html += th('할인율', 'rate');
  html += th('할인한도(만원)', 'limit');
  html += '<th>비고</th><th></th>';
  html += '</tr></thead><tbody>';
  rows.forEach(r => {
    html += '<tr>';
    html += '<td>' + escapeHtml(r.date) + '</td>';
    html += '<td>' + escapeHtml(r.site) + '</td>';
    html += '<td><span class="tag ' + (r.kind === '전사' ? 'kind-jeonsa' : 'kind-item') + '">' + escapeHtml(r.kind) + '</span></td>';
    html += '<td>' + (r.pay === '카카오페이' ? '<span class="tag pay-kakao">카카오페이</span>' : r.pay === '토스페이' ? '<span class="tag pay-toss">토스페이</span>' : '결합없음') + '</td>';
    html += '<td>' + escapeHtml(r.card) + '</td>';
    html += '<td>' + escapeHtml(r.rate) + '</td>';
    html += '<td>' + (r.limit ? escapeHtml(r.limit) : '-') + '</td>';
    html += '<td>' + escapeHtml(r.memo || '-') + '</td>';
    html += '<td><button class="del" data-id="' + r.id + '">삭제</button></td>';
    html += '</tr>';
  });
  html += '</tbody></table>';
  wrap.innerHTML = html;

  // 헤더 클릭 정렬
  wrap.querySelectorAll('th.sortable').forEach(el => {
    el.addEventListener('click', () => {
      const f = el.dataset.sort;
      if(sortField === f){
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      }else{
        sortField = f;
        sortDir = f === 'date' ? 'desc' : 'asc';
      }
      renderList();
    });
  });

  wrap.querySelectorAll('.del').forEach(btn => {
    btn.addEventListener('click', async () => {
      if(!confirm('이 기록을 삭제하시겠습니까?')) return;
      await store.remove(btn.dataset.id);
      await refreshAll();
    });
  });
}

function renderCalendar(){
  const site = document.getElementById('cal-site').value;
  const monthVal = document.getElementById('cal-month').value;
  const wrap = document.getElementById('cal-wrap');
  const summaryEl = document.getElementById('cal-summary');
  if(!monthVal){ wrap.innerHTML = ''; summaryEl.innerHTML = ''; return; }
  const parts = monthVal.split('-').map(Number);
  const year = parts[0], month = parts[1];
  const daysInMonth = new Date(year, month, 0).getDate();
  const dow = ['일','월','화','수','목','금','토'];

  // 메인카드사 정의 (쇼핑몰별 추가 카드 포함)
  const baseMain = ['신한','삼성','국민'];
  const mallExtra = {'롯데홈쇼핑':'롯데','Hmall':'현대','현대홈쇼핑':'현대'};
  const mainCards = mallExtra[site] ? baseMain.concat([mallExtra[site]]) : baseMain;

  // 이번 달 메인카드사 전사 행사 필터링
  const monthPrefix = year + '-' + String(month).padStart(2,'0');
  const mainEvents = entries.filter(e =>
    e.site === site &&
    e.date.startsWith(monthPrefix) &&
    e.kind === '전사' &&
    mainCards.indexOf(e.card) !== -1
  );
  const totalCount = mainEvents.length;
  const totalRatio = Math.round(totalCount / daysInMonth * 100);
  const rates = ['5%','7%','8%','10%'];
  const rateDays = rates.map(r => ({
    rate: r,
    days: mainEvents.filter(e => e.rate === r).length
  }));

  let summaryHtml = '<div class="cal-summary">';
  summaryHtml += '<div class="cal-summary-title">메인카드사 행사 비중';
  summaryHtml += '<span class="cal-summary-note">(' + mainCards.join(', ') + ' / ' + daysInMonth + '일 기준)</span></div>';
  summaryHtml += '<div class="cal-summary-total"><span class="stat-val-big">' + totalRatio + '%</span> <span class="cal-summary-note">(' + totalCount + '건 / ' + daysInMonth + '일)</span></div>';
  summaryHtml += '<div class="cal-summary-rows">';
  rateDays.forEach(s => {
    summaryHtml += '<div class="stat-row"><span class="stat-rate">' + s.rate + '</span> <span class="stat-val">' + s.days + '일</span></div>';
  });
  summaryHtml += '</div></div>';
  summaryEl.innerHTML = summaryHtml;

  const dayData = [];
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = year + '-' + String(month).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    const dayEntries = entries.filter(e => e.site === site && e.date === dateStr);
    dayData.push({
      day: d,
      dow: dow[new Date(year, month-1, d).getDay()],
      jeonsa: dayEntries.filter(e => e.kind === '전사'),
      item: dayEntries.filter(e => e.kind === '상품별')
    });
  }

  // 7일씩 묶기
  const chunks = [];
  for(let i = 0; i < dayData.length; i += 7){
    chunks.push(dayData.slice(i, i+7));
  }

  let html = '';
  chunks.forEach(chunk => {
    // 빈 셀 채우기
    while(chunk.length < 7) chunk.push(null);

    const payPrefix = p => p === '카카오페이' ? 'KP' : (p === '토스페이' ? 'TP' : '');
    const cardClass = {
      '신한':'card-shinhan','국민':'card-kb','삼성':'card-samsung',
      '롯데':'card-lotte','현대':'card-hyundai','비씨':'card-bc',
      '농협':'card-nh','하나':'card-hana','우리':'card-woori'
    };
    const lineClass = (row, card) => 'cal-line ' + row + ' ' + (cardClass[card] || '');

    html += '<table class="cal-table">';
    // 날짜 행
    html += '<tr><td class="cal-label">날짜</td>';
    chunk.forEach(c => {
      html += '<td class="cal-daynum">' + (c ? c.day + '일' : '') + '</td>';
    });
    html += '</tr>';
    // 요일 행
    html += '<tr><td class="cal-label">요일</td>';
    chunk.forEach(c => {
      html += '<td class="cal-dow">' + (c ? c.dow : '') + '</td>';
    });
    html += '</tr>';
    // 전사 행
    html += '<tr><td class="cal-label">전사</td>';
    chunk.forEach(c => {
      if(!c){ html += '<td></td>'; return; }
      const cells = c.jeonsa.map(e => '<div class="' + lineClass('jeonsa', e.card) + '">' + escapeHtml(payPrefix(e.pay) + e.card) + ' ' + escapeHtml(e.rate.replace('%','')) + '</div>').join('');
      html += '<td>' + (cells || '-') + '</td>';
    });
    html += '</tr>';
    // 상품별 행
    html += '<tr><td class="cal-label">상품별</td>';
    chunk.forEach(c => {
      if(!c){ html += '<td></td>'; return; }
      const cells = c.item.map(e => '<div class="' + lineClass('item', e.card) + '">' + escapeHtml(payPrefix(e.pay) + e.card) + ' ' + escapeHtml(e.rate.replace('%','')) + '</div>').join('');
      html += '<td>' + (cells || '-') + '</td>';
    });
    html += '</tr>';
    html += '</table>';
  });
  wrap.innerHTML = html;
}

refreshAll();
</script>
</body>
</html>
